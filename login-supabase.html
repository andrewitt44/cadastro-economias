<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Economias</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .error-box {
            display: none;
            background: var(--danger-light);
            border-left: 3px solid var(--danger);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 16px;
            color: var(--danger-dark);
            font-size: 13px;
        }
        .error-box.show { display: block; }
        .error-box strong { display: block; margin-bottom: 4px; }
        .error-box code {
            display: block;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            background: rgba(0,0,0,0.05);
            padding: 4px 6px;
            border-radius: 3px;
            margin-top: 4px;
        }
        .success-box {
            display: none;
            background: #f0fdf4;
            border-left: 3px solid #22c55e;
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 16px;
            color: #15803d;
            font-size: 13px;
        }
        .success-box.show { display: block; }
        .success-box strong { display: block; margin-bottom: 4px; }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-white);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 82, 165, 0.1);
        }
        .btn-email-auth {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: filter 0.2s;
            margin-top: 4px;
        }
        .btn-email-auth:hover:not(:disabled) { filter: brightness(0.9); }
        .btn-email-auth:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-toggle {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .auth-toggle a {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
            margin-left: 4px;
        }
        .auth-toggle a:hover { text-decoration: underline; }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>Sistema de Economias</h1>
            <p class="subtitle">Faça login para continuar</p>
            
            <div id="loadingDiv" class="loading">
                <p>Carregando...</p>
            </div>
            
            <div id="loginContent">
                <div id="errorBox" class="error-box">
                    <strong id="errorTitle">Erro ao fazer login</strong>
                    <span id="errorMessage"></span>
                    <code id="errorDetail"></code>
                </div>

                <div id="successBox" class="success-box">
                    <strong id="successTitle"></strong>
                    <span id="successMessage"></span>
                </div>

                <form id="emailForm">
                    <div class="form-group">
                        <label for="inputEmail">E-mail</label>
                        <input type="email" id="inputEmail" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="inputPassword">Senha</label>
                        <input type="password" id="inputPassword" placeholder="••••••••" required autocomplete="current-password" minlength="6">
                    </div>
                    <button type="submit" id="btnEmailAuth" class="btn-email-auth">Entrar</button>
                </form>

                <div class="auth-toggle">
                    <span id="toggleText">Não tem conta?</span>
                    <a id="toggleLink">Cadastrar</a>
                </div>

                <div class="auth-divider">ou</div>

                <div class="social-login">
                    <button id="btnLoginGoogle" class="btn btn-social btn-google">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                            <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9.003 18z" fill="#34A853"/>
                            <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                            <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.426 0 9.003 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29c.708-2.127 2.692-3.71 5.039-3.71z" fill="#EA4335"/>
                        </svg>
                        Continuar com Google
                    </button>
                </div>

                <p class="login-footer">
                    Ao fazer login, você concorda com nossos termos de uso.
                </p>
            </div>
        </div>
    </div>
    
    <!-- Supabase SDK (arquivo local - mais confiável que CDN) -->
    <script src="js/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script>
        const loadingDiv = document.getElementById('loadingDiv');
        const loginContent = document.getElementById('loginContent');

        function showError(title, message, detail) {
            hideSuccess();
            const box = document.getElementById('errorBox');
            document.getElementById('errorTitle').textContent = title;
            document.getElementById('errorMessage').textContent = message || '';
            document.getElementById('errorDetail').textContent = detail || '';
            document.getElementById('errorDetail').style.display = detail ? 'block' : 'none';
            box.classList.add('show');
        }

        function hideError() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function showSuccess(title, message) {
            hideError();
            document.getElementById('successTitle').textContent = title;
            document.getElementById('successMessage').textContent = message || '';
            document.getElementById('successBox').classList.add('show');
        }

        function hideSuccess() {
            document.getElementById('successBox').classList.remove('show');
        }

        // Verificar se o SDK carregou corretamente
        if (typeof SupabaseConfig === 'undefined') {
            loadingDiv.classList.remove('show');
            loginContent.style.display = 'block';
            showError(
                'Erro de carregamento',
                'O SDK do Supabase não carregou. Verifique sua conexão com a internet e recarregue a página.',
                'window.supabase = ' + (typeof window.supabase)
            );
        }

        // Verificar se já está logado
        if (typeof SupabaseConfig !== 'undefined') {
            (async () => {
                loadingDiv.classList.add('show');
                loginContent.style.display = 'none';

                try {
                    const session = await SupabaseConfig.checkAuth();
                    if (session) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                } catch (error) {
                    console.error('Erro ao verificar autenticação:', error);
                }

                loadingDiv.classList.remove('show');
                loginContent.style.display = 'block';
            })();
        }

        // Toggle entre Entrar e Cadastrar
        let isSignUp = false;
        document.getElementById('toggleLink').addEventListener('click', () => {
            isSignUp = !isSignUp;
            document.getElementById('btnEmailAuth').textContent = isSignUp ? 'Cadastrar' : 'Entrar';
            document.getElementById('toggleText').textContent = isSignUp ? 'Já tem conta?' : 'Não tem conta?';
            document.getElementById('toggleLink').textContent = isSignUp ? 'Entrar' : 'Cadastrar';
            document.getElementById('inputPassword').setAttribute('autocomplete', isSignUp ? 'new-password' : 'current-password');
            hideError();
            hideSuccess();
        });

        // Login / Cadastro com e-mail
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEmailAuth');
            const email = document.getElementById('inputEmail').value.trim();
            const password = document.getElementById('inputPassword').value;

            btn.disabled = true;
            btn.textContent = isSignUp ? 'Cadastrando...' : 'Entrando...';
            hideError();
            hideSuccess();

            try {
                if (isSignUp) {
                    await SupabaseConfig.signUpWithEmail(email, password);
                    showSuccess(
                        'Cadastro realizado!',
                        'Verifique seu e-mail e clique no link de confirmação para ativar sua conta.'
                    );
                    document.getElementById('emailForm').reset();
                } else {
                    await SupabaseConfig.loginWithEmail(email, password);
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                let msg = error?.message || JSON.stringify(error);
                if (msg.includes('Invalid login credentials')) msg = 'E-mail ou senha incorretos.';
                if (msg.includes('Email not confirmed')) msg = 'E-mail ainda não confirmado. Verifique sua caixa de entrada.';
                if (msg.includes('User already registered')) msg = 'Este e-mail já está cadastrado. Tente fazer login.';
                if (msg.includes('Password should be at least')) msg = 'A senha deve ter pelo menos 6 caracteres.';
                if (msg.includes('rate limit') || msg.includes('429') || error?.status === 429)
                    msg = 'Muitas tentativas em pouco tempo. Aguarde alguns minutos e tente novamente.';
                showError(isSignUp ? 'Erro ao cadastrar' : 'Erro ao fazer login', msg, '');
            } finally {
                btn.disabled = false;
                btn.textContent = isSignUp ? 'Cadastrar' : 'Entrar';
            }
        });

        // Login com Google
        document.getElementById('btnLoginGoogle').addEventListener('click', async () => {
            const btn = document.getElementById('btnLoginGoogle');
            btn.disabled = true;
            btn.textContent = 'Redirecionando...';
            
            try {
                hideError();
                await SupabaseConfig.loginWithGoogle();
            } catch (error) {
                console.error('Erro ao fazer login com Google:', error);
                const msg = error?.message || JSON.stringify(error);
                showError('Erro ao fazer login com Google', msg, `Código: ${error?.status || 'N/A'}`);
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                        <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18L12.05 13.56c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9.003 18z" fill="#34A853"/>
                        <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                        <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.426 0 9.003 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29c.708-2.127 2.692-3.71 5.039-3.71z" fill="#EA4335"/>
                    </svg>
                    Continuar com Google
                `;
            }
        });
    </script>
</body>
</html>
